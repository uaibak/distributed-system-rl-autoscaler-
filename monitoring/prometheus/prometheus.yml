global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'frontend'
    static_configs:
      - targets: ['frontend:5000']
        labels:
          service: frontend
    metrics_path: /metrics

  - job_name: 'backend'
    static_configs:
      - targets: ['backend:5001']
        labels:
          service: backend
    metrics_path: /metrics
